; ============================================================
;  Meshtastic Tracker Display — T-Deck build
;  platformio.ini
; ============================================================

[platformio]
default_envs = t-deck-tracker-display

[env:t-deck-tracker-display]
extends = env:t-deck
build_type = release

; Extra source dirs so PlatformIO finds our custom files
build_src_filter =
    +<*>
    +<../tdeck-display/src/**>

build_flags =
    ${env:t-deck.build_flags}

    ; Enable our tracker display module
    -DUSE_TRACKER_DISPLAY_MODULE=1
