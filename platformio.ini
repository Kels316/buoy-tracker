; ============================================================
;  Meshtastic GPS Tracker — T-Beam custom build
;  platformio.ini
; ============================================================

[platformio]
default_envs = tbeam-tracker

; ── Inherit the upstream T-Beam environment ─────────────────
[env:tbeam-tracker]
extends            = env:tbeam
build_type         = release

; Extra source dirs so PlatformIO finds our custom files
build_src_filter   =
    +<*>
    +<../meshtastic-tracker/src/**>

; ── Build flags ─────────────────────────────────────────────
build_flags        =
    ${env:tbeam.build_flags}

    ; Disable OLED / display stack entirely
    -DUSE_SH1106=0
    -DUSE_SSD1306=0
    -DHAS_SCREEN=0

    ; Disable Bluetooth (saves ~60 KB flash, optional)
    ; Comment out if you still want BLE config access
    -DUSE_BT=0

    ; Enable our custom tracker module
    -DUSE_TRACKER_MODULE=1

    ; GPS — force on, never sleep
    -DGPS_POWER_TOGGLE=0

    ; Position broadcast interval guard (our module overrides this,
    ; but set it high so the built-in position module doesn't race us)
    -DPOSITION_BROADCAST_SECS=3600
